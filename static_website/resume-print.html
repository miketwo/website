<!DOCTYPE html>
<html lang="en">
<head>

   <!--- Basic Page Needs
   ================================================== -->
   <meta charset="utf-8">
    <title>Michael Aherne</title>
    <meta name="description" content="Personal Page">
    <meta name="author" content="Michael Aherne">

   <!-- Mobile Specific Metas
   ================================================== -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <!-- CSS
    ================================================== -->
   <link rel="stylesheet" href="css/default.css">
   <link rel="stylesheet" href="css/layout.css">
   <link rel="stylesheet" href="css/dynamic_resume.css">
   <!-- <link rel="stylesheet" href="css/thumbs.css"> -->
   <link rel="stylesheet" href="css/media-queries.css">

   <!-- Favicons
    ================================================== -->
    <link rel="shortcut icon" href="favicon.png" >

</head>

<body class="resume-page resume-print-page" data-resume-mode="print">
  <div id="print-actions" class="resume-toolbar resume-toolbar--print">
    <div class="btn-group">
      <a class="btn btn-info" href="resume.html">Interactive View</a>
      <button type="button" class="btn btn-info" data-action="print">Print / Save PDF</button>
      <a class="btn btn-info" href="downloads/resume.pdf" target="_blank" rel="noopener">Current PDF</a>
    </div>
  </div>

   <section id="dynamic_resume">
      <!-- BEGIN: Underscore Template Definition. -->
      <script type="text/template" class="template">

      <div class="row titleblock resume-row resume-row--title">

         <div class="three columns resume-col resume-col--photo">
            <img class="profile-pic"  src="images/profilepic2_zoomed.jpg" alt="" />
         </div>

         <div class="six columns resume-col resume-col--identity">

              <h1><%- rc.biographical.name %></h1>
              <h2>
                <span class='Leadership'>Leadership. </span>
                <span class='Aerospace'>Aerospace. </span>
                <span class='Software'>Software. </span>
              </h2>
          </div>
          <div class="three columns right resume-col resume-col--meta">
                  <div class="resume-contact-line"><%- rc.biographical.email %></div>
                  <div class="resume-contact-line"><%- rc.biographical.website %></div>
                  <div class="resume-contact-line"><%- rc.biographical.address %></div>
                  <div class="resume-contact-line"><%- rc.biographical.citizenship %></div>
                  <div class="resume-contact-line"><%- rc.biographical.clearance %></div>
          </div>
      </div>

      <div class="row new-section">
        <div class="twelve columns">
          <h1>Experience</h1>
        </div>
      </div>

      <% _.each( rc.experience, function(job){ var leadBullet = job.bullets[0]; var remainingBullets = job.bullets.slice(1); %>
        <div class="each resume-item">
        <div class="resume-item-lead">
          <div class="row resume-row resume-row--heading">
            <div class="three columns resume-col resume-col--date">
              <h1><%- job.time %></h1>
            </div>
            <div class="six columns resume-col resume-col--main">
              <h1><%- job.name %></h1>
              <h2><%- job.title %></h2>
            </div>
            <div class="three columns right resume-col resume-col--meta">
              <h1><%- job.location %></h1>
            </div>
          </div>
          <div class="row resume-row resume-row--detail resume-row--detail-lead">
            <div class="three columns resume-col resume-col--spacer">
              <!-- Nothing -->
            </div>
            <div class="nine columns resume-col resume-col--detail-main">
              <p class="resume-detail-intro"><%- job.description %></p>
              <% if (leadBullet) { %>
              <ul class="resume-bullets resume-bullets--lead">
                <li class="<%= leadBullet.tags ? leadBullet.tags.join(' ') : '' %> resume-bullet--first"><%= leadBullet.description %> <b><%- leadBullet.skills %></b></li>
              </ul>
              <% } %>
            </div>
          </div>
        </div>
        <% if (remainingBullets.length) { %>
        <div class="row resume-row resume-row--detail resume-row--detail-follow">
          <div class="three columns resume-col resume-col--spacer">
            <!-- Nothing -->
          </div>
          <div class="nine columns resume-col resume-col--detail-main">
            <ul class="resume-bullets resume-bullets--follow">
              <% _.each(remainingBullets, function(bullet){ %>
                <li class="<%= bullet.tags ? bullet.tags.join(' ') : '' %>"><%= bullet.description %> <b><%- bullet.skills %></b></li>
              <% }); %>
            </ul>
          </div>
        </div>
        <% } %>
        </div>
      <% }); %>



      <div class="row new-section">
        <div class="twelve columns">
          <h1>Education</h1>
        </div>
      </div>
      <% _.each(rc.education, function( ed ){ %>
        <div class="each resume-item">
        <div class="row resume-row resume-row--heading">
          <div class="three columns resume-col resume-col--date">
            <h1><%- ed.time %></h1>
          </div>
          <div class="six columns resume-col resume-col--main">
            <h1><%- ed.school %></h1>
            <h2><%- ed.degree %></h2>
          </div>
          <div class="three columns right resume-col resume-col--meta">
            <h1><%- ed.location %></h1>
          </div>
        </div>

        <div class="row resume-row resume-row--detail">
          <div class="three columns resume-col resume-col--spacer">
            <!-- Nothing -->
          </div>
          <div class="nine columns resume-col resume-col--detail-main">
            <ul class="resume-bullets">
              <% _.each(ed.bullets, function(bullet, bulletIndex){ %>
                <li class="<%= bullet.tags? bullet.tags.join(' '):'' %><%= bulletIndex === 0 ? ' resume-bullet--first' : '' %>"><%= bullet.description %></li>
              <% }); %>
            </ul>
          </div>
        </div>
        </div>
      <% }); %>

      <div class="row new-section">
        <div class="twelve columns">
          <h1>Publications</h1>
        </div>
      </div>
      <% _.each(rc.publications, function( pub ){ %>
      <div class="each resume-item">
        <div class="row resume-row resume-row--detail">
          <div class="three columns resume-col resume-col--spacer">
            <!-- Nothing -->
          </div>
          <div class="nine columns resume-col resume-col--detail-main">
            <h1><a href="<%- pub.link %>"><%- pub.name %></a></h1>
            <p><%- pub.authors %><%- pub.serial %><%- pub.description %></p>
          </div>
        </div>
      </div>
      <% }); %>

      <div class="row new-section">
        <div class="twelve columns">
          <h1>Languages</h1>
        </div>
      </div>
      <div class="row resume-row resume-row--simple">
        <div class="three columns resume-col resume-col--spacer">
          <!-- Nothing -->
        </div>
        <div class="six columns resume-col resume-col--detail-main">
          <p><%- rc.languages.join(', ') %></p>
        </div>
        <div class="three columns resume-col resume-col--meta">
          <!-- Nothing -->
        </div>
      </div>

      <div class="row new-section">
        <div class="twelve columns">
          <h1>Personal</h1>
        </div>
      </div>
      <div class="row resume-row resume-row--simple">
        <div class="three columns resume-col resume-col--spacer">
          <!-- Nothing -->
        </div>
        <div class="six columns resume-col resume-col--detail-main">
          <p><%- rc.personal.join(', ') %></p>
        </div>
        <div class="three columns resume-col resume-col--meta">
          <!-- Nothing -->
        </div>
      </div>
    </script>
    <!-- END: Underscore Template Definition. -->

   </section> <!-- Section End-->

   <!-- footer
   ================================================== -->
   <footer>

      <div class="row">

         <div class="twelve columns">

            <ul class="social-links">
               <li><a href="https://www.linkedin.com/in/miketwo"><i class="fa fa-linkedin"></i></a></li>
               <li><a href="mailto:miketwo@gmail.com"><i class="fa fa-envelope"></i></a></li>
            </ul>

            <ul class="copyright">
               <li>&copy; Copyright 2014 CeeVee</li>
               <li>Design by <a title="Styleshout" href="http://www.styleshout.com/">Styleshout</a></li>
               <li>Source on <a title="GitHub" href="https://github.com/miketwo/website">GitHub</a></li>
            </ul>

         </div>

         <div id="go-top"><a class="smoothscroll" title="Back to Top" href="#home"><i class="icon-up-open"></i></a></div>

      </div>

   </footer> <!-- Footer End-->

   <!-- Java Script
   ================================================== -->
   <script src="js/jquery-1.10.2.min.js"></script>
   <script type="text/javascript" src="js/jquery-migrate-1.2.1.min.js"></script>
   <script src="js/underscore-min.js"></script>
   <script src="js/jquery-ui.min.js"></script>
   <script src="js/jquery.sticky.js"></script>
   <script src="js/resume-data.js"></script>
   <script src="js/resume.js"></script>
   <script>
    // Todo: Move all includes inside resume.js using requirejs.
    DynamicResume($("#dynamic_resume"));  // Renders everything
   </script>
</body>

</html>
